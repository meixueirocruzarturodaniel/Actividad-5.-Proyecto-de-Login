<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Dashboard</title>
    <!-- Conectamos una nueva hoja de estilos para esta pantalla -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <button id="menuToggle" class="btn-icon">☰</button>
            <span class="logo">MiSistema</span>
        </div>
        <div class="navbar-right">
            <div class="user-menu-container">
                <button id="userButton" class="user-btn">
                    <span id="userNameDisplay">Usuario</span>
                    <span class="arrow">▼</span>
                </button>
                <div id="userDropdown" class="dropdown-menu hidden">
                    <button id="logoutBtn" class="dropdown-item">Salir del sistema</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="layout-container">
        <aside id="sidebar" class="sidebar">
        </aside>

        <main class="main-content">
            <h1>Bienvenido al sistema</h1>
            <p>Selecciona una opción del menú lateral para comenzar.</p>
        </main>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
