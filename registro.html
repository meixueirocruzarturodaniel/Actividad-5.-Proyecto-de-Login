<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Crear Cuenta</h1>
                <p>Registra tus credenciales para acceder</p>
</div>
       <form id="registroForm">
        <div class="form-group">
         <label for="regEmail">Nuevo Correo Electrónico</label>
     <input type="email" id="regEmail" placeholder="xxxxxx@correo.com" required>
  </div>
      <div class="form-group">
       <label for="regPassword">Crear Contraseña</label>
         <input type="password" id="regPassword" required>
                </div>
    <p id="regErrorMessage" class="error-text hidden">Por favor, completa ambos campos.</p>
 <button type="submit" class="btn-submit">Registrarse e Ingresar</button>
            </form>
<div class="register-link">
  <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
   </div>
 </div>
    </div>
    <script src="js/registro.js"></script>
</body>
</html>
